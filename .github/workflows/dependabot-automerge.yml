name: Dependabot Auto-merge

on:
  workflow_call:

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Enable auto-merge for minor/patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: |
          if ! gh pr merge --auto --squash "$PR_URL"; then
            echo "::warning::Could not enable auto-merge on this PR — the repo likely has no required status checks configured in branch protection (a hard prerequisite for GitHub's auto-merge feature). Leaving PR open for manual merge."
            echo "auto_merge_failed=true" >> "$GITHUB_OUTPUT"
          fi
        id: merge
        continue-on-error: true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Request review and assign on auto-merge failure (patch/minor)
        if: steps.merge.outputs.auto_merge_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['athal7']
            });
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: ['athal7']
            });
      - name: Post Jules comment on auto-merge failure (patch/minor)
        if: steps.merge.outputs.auto_merge_failed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const julesComment = "@Jules this dependency bump couldn't auto-merge (major version change, or no CI to verify against) — can you check the changelog/release notes for breaking changes and update any affected code if needed?";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const alreadyPosted = comments.some(c => c.body.includes(julesComment));
            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: julesComment
              });
            }
      - name: Request review and assign for major version bumps
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['athal7']
            });
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              assignees: ['athal7']
            });
      - name: Post Jules comment for major version bumps
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        uses: actions/github-script@v7
        with:
          script: |
            const julesComment = "@Jules this dependency bump couldn't auto-merge (major version change, or no CI to verify against) — can you check the changelog/release notes for breaking changes and update any affected code if needed?";
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100
            });
            const alreadyPosted = comments.some(c => c.body.includes(julesComment));
            if (!alreadyPosted) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: julesComment
              });
            }
