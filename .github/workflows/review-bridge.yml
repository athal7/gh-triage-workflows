name: Review Bridge

on:
  workflow_call:

jobs:
  coderabbit-flagged:
    if: github.event_name == 'pull_request_review' && github.event.review.user.login == 'coderabbitai[bot]' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['athal7']
            });

  jules-opened:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.user.login == 'google-labs-jules[bot]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              reviewers: ['athal7']
            });
