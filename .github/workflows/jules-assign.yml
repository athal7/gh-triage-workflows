name: Jules Auto-Assign

on:
  workflow_call: {}

jobs:
  assign-jules:
    if: github.event_name == 'issues' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Evaluate and assign jules label
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'jules';

            async function ensureLabelExists() {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label });
              } catch (e) {
                await github.rest.issues.createLabel({
                  owner, repo, name: label, color: '4285F4',
                  description: 'Auto-assigned: let Google Jules attempt a fix'
                });
              }
            }

            async function isBlocked(body) {
              const matches = [...(body || '').matchAll(/\bblocked\s+(?:on|by)\s+#(\d+)/gi)];
              for (const m of matches) {
                const blockerNum = parseInt(m[1], 10);
                try {
                  const { data: blocker } = await github.rest.issues.get({ owner, repo, issue_number: blockerNum });
                  if (blocker.state === 'open') return true;
                } catch (e) { /* unresolvable reference, ignore */ }
              }
              return false;
            }

            async function hasLinkedPR(number) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      closedByPullRequestsReferences(first: 10) { nodes { state } }
                    }
                  }
                }`;
              const result = await github.graphql(query, { owner, repo, number });
              const nodes = result.repository.issue.closedByPullRequestsReferences.nodes;
              return nodes.some(pr => pr.state === 'OPEN' || pr.state === 'MERGED');
            }

            async function maybeAssign(issue) {
              const labels = (issue.labels || []).map(l => (typeof l === 'string' ? l : l.name));
              if (labels.includes(label) || labels.includes('no-jules')) return;
              if (await isBlocked(issue.body)) {
                console.log(`#${issue.number}: blocked, skipping.`);
                return;
              }
              if (await hasLinkedPR(issue.number)) {
                console.log(`#${issue.number}: has a linked PR, skipping.`);
                return;
              }
              await ensureLabelExists();
              await github.rest.issues.addLabels({ owner, repo, issue_number: issue.number, labels: [label] });
              console.log(`#${issue.number}: assigned jules.`);
            }

            if (context.eventName === 'issues') {
              await maybeAssign(context.payload.issue);
            } else {
              const issues = await github.paginate(github.rest.issues.listForRepo, {
                owner, repo, state: 'open', per_page: 100
              });
              for (const issue of issues) {
                if (issue.pull_request) continue;
                await maybeAssign(issue);
              }
            }
